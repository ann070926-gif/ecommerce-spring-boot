<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đơn hàng - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
        }

        .card {
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .1);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead {
            background: #f8f9fa;
        }

        .table th {
            border-bottom: 2px solid #dee2e6;
            font-weight: 600;
        }

        .badge {
            padding: 6px 10px;
            font-size: 12px;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 13px;
        }

        .btn-detail {
            color: #0d6efd;
        }

        .btn-detail:hover {
            color: #0a58ca;
            text-decoration: none;
        }

        .btn-danger {
            background: #dc3545;
            border: none;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container mt-4 mb-5">
        <h2 class="text-primary mb-4">
            <i class="fas fa-list"></i> QUẢN LÝ ĐƠN HÀNG
        </h2>

        <div class="container mb-5">
            <div class="card">
                <div class="card-header bg-light p-3">
                    <h5 class="mb-0"><i class="fas fa-list-ul me-2"></i>Danh sách đơn hàng</h5>
                </div>
                <div class="card-body p-0">
                    <div th:if="${orders.isEmpty()}" class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>Chưa có đơn hàng nào</p>
                    </div>

                    <div th:if="${!orders.isEmpty()}" class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Ảnh</th> <!-- thêm -->
                                    <th>Mã đơn hàng</th>
                                    <th>Khách hàng</th>
                                    <th>Ngày đặt</th>
                                    <th>Địa chỉ</th>
                                    <th>Tổng hàng</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>

                            <tbody>
                                <tr th:each="order, stat : ${orders}">
                                    <td th:text="${stat.count}"></td>

                                    <!-- CHỈ THÊM ĐOẠN NÀY -->
                                    <td>
                                        <img th:if="${order.orderDetails != null and !order.orderDetails.isEmpty()}"
                                            th:src="@{'/images/' + ${order.orderDetails[0].product.image}}"
                                            style="width:50px;height:50px;object-fit:cover;border-radius:6px;">

                                        <span
                                            th:if="${order.orderDetails == null or order.orderDetails.isEmpty()}">-</span>
                                    </td>

                                    <td><strong th:text="'#' + ${order.id}"></strong></td>

                                    <td>
                                        <span th:if="${order.account != null}"
                                            th:text="${order.account.username}"></span>
                                        <br>
                                        <small class="text-muted" th:if="${order.account != null}"
                                            th:text="${order.account.fullname}"></small>
                                    </td>

                                    <td th:text="${#dates.format(order.createDate, 'dd/MM/yyyy HH:mm')}"></td>

                                    <td th:text="${order.address}"></td>

                                    <td>
                                        <span th:if="${order.orderDetails != null}"
                                            th:text="${order.orderDetails.size()} + ' sản phẩm'"></span>
                                        <span th:if="${order.orderDetails == null}">0 sản phẩm</span>
                                    </td>

                                    <td>
                                        <a th:href="@{/admin/order/detail/{id}(id=${order.id})}"
                                            class="btn btn-sm btn-detail">
                                            <i class="fas fa-eye me-1"></i>Chi tiết
                                        </a>
                                        <a th:href="@{/admin/order/delete/{id}(id=${order.id})}"
                                            class="btn btn-sm btn-danger" onclick="return confirm('Xóa đơn hàng này?')">
                                            <i class="fas fa-trash me-1"></i>Xóa
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
