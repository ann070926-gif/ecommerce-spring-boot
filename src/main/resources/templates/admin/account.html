<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container mt-4 mb-5">
        <h2 class="text-primary mb-4"><i class="fas fa-users"></i> QUẢN LÝ TÀI KHOẢN</h2>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-dark text-white fw-bold">Thông tin tài khoản</div>
                    <div class="card-body">
                        <form th:action="@{/admin/account/save}" th:object="${account}" method="post">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên đăng nhập</label>
                                <input type="text" th:field="*{username}" class="form-control" 
                                       th:readonly="${isEdit}" required>
                                <small class="text-muted d-block mt-1" th:if="${isEdit}">Không thể sửa tên đăng nhập</small>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mật khẩu</label>
                                <input type="password" th:field="*{password}" class="form-control" required>
                                <small class="text-muted d-block mt-1">Mật khẩu được lưu trữ an toàn</small>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Họ và tên</label>
                                <input type="text" th:field="*{fullname}" class="form-control" placeholder="Nhập họ tên">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Email</label>
                                <input type="email" th:field="*{email}" class="form-control" placeholder="Nhập email">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Ảnh đại diện (URL)</label>
                                <input type="text" th:field="*{photo}" class="form-control" placeholder="Nhập đường dẫn ảnh">
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Lưu (Save)</button>
                                <a th:href="@{/admin/account}" class="btn btn-secondary"><i class="fas fa-redo"></i> Làm mới</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white fw-bold">Danh sách tài khoản</div>
                    <div class="card-body p-0">
                        <table class="table table-hover table-bordered mb-0 text-center align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Tên đăng nhập</th>
                                    <th>Họ và tên</th>
                                    <th>Email</th>
                                    <th>Ảnh đại diện</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="acc : ${items}">
                                    <td th:text="${acc.username}" class="fw-bold"></td>
                                    <td th:text="${acc.fullname != null ? acc.fullname : 'Chưa cập nhật'}"></td>
                                    <td th:text="${acc.email != null ? acc.email : 'Chưa cập nhật'}"></td>
                                    <td>
                                        <div th:if="${acc.photo != null and !acc.photo.isEmpty()}">
                                            <img th:src="${acc.photo}" alt="" style="width: 50px; height: 50px; object-fit: cover; border-radius: 50%; border: 1px solid #ddd;">
                                        </div>
                                        <div th:unless="${acc.photo != null and !acc.photo.isEmpty()}">
                                            <span class="badge bg-secondary">Không có ảnh</span>
                                        </div>
                                    </td>
                                    <td>
                                        <a th:href="@{|/admin/account/edit/${acc.username}|}" class="btn btn-sm btn-outline-primary" title="Sửa">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <a th:href="@{|/admin/account/delete/${acc.username}|}" class="btn btn-sm btn-outline-danger" title="Xóa"
                                           onclick="return confirm('Bạn có chắc chắn muốn xóa tài khoản này? Hành động này không thể hoàn tác!');">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <div th:if="${items.isEmpty()}" class="p-4 text-center text-muted">
                            Chưa có tài khoản nào
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
