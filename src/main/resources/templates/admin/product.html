<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container mt-4 mb-5">
        <h2 class="text-primary mb-4"><i class="fas fa-boxes"></i> QUẢN LÝ SẢN PHẨM</h2>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-dark text-white fw-bold">Thông tin sản phẩm</div>
                    <div class="card-body">
                        <form th:action="@{/admin/product/save}" th:object="${product}" method="post" enctype="multipart/form-data">

                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên sản phẩm</label>
                                <input type="text" th:field="*{name}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Đơn giá (VNĐ)</label>
                                <input type="number" th:field="*{price}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Loại hàng</label>
                                <select th:field="*{category.id}" class="form-select">
                                    <option th:each="c : ${categories}"
                                            th:value="${c.id}"
                                            th:text="${c.name}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Tải ảnh lên</label>
                                <input type="file" name="imageFile" id="imageFile"
                                       class="form-control" accept="image/*"
                                       onchange="previewImage(event)">

                                <input type="hidden" th:field="*{image}">

                                <!-- Preview ảnh mới -->
                                <div id="preview-wrapper" class="mt-3 text-center" style="display:none;">
                                    <p class="mb-1 text-muted"><small>Xem trước ảnh mới:</small></p>
                                    <img id="image-preview" src="#" alt="Preview"
                                         style="height: 120px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd; padding: 2px;">
                                </div>

                                <!-- Ảnh hiện tại -->
                                <div th:if="${product.image != null and !product.image.isEmpty()}"
                                     id="current-image-wrapper" class="mt-3 text-center">
                                    <p class="mb-1 text-muted"><small>Ảnh hiện tại:</small></p>
                                    <img th:src="@{|/images/${product.image}|}" alt="Ảnh sản phẩm"
                                         style="height: 120px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd; padding: 2px;">
                                </div>
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-save"></i> Lưu (Save)
                                </button>
                                <a th:href="@{/admin/product}" class="btn btn-secondary">
                                    <i class="fas fa-redo"></i> Làm mới
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white fw-bold">Danh sách sản phẩm</div>
                    <div class="card-body p-0">
                        <table class="table table-hover table-bordered mb-0 text-center align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Tên sản phẩm</th>
                                    <th>Giá</th>
                                    <th>Ảnh</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${items}">
                                    <td th:text="${p.id}"></td>
                                    <td th:text="${p.name}" class="text-start fw-bold"></td>
                                    <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                    <td>
                                        <img th:src="@{|/images/${p.image}|}" alt=""
                                             style="width: 55px; height: 55px; object-fit: cover; border-radius: 5px;">
                                    </td>
                                    <td>
                                        <a th:href="@{|/admin/product/edit/${p.id}|}"
                                           class="btn btn-sm btn-outline-primary" title="Sửa">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <a th:href="@{|/admin/product/delete/${p.id}|}"
                                           class="btn btn-sm btn-outline-danger" title="Xóa"
                                           onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?');">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function previewImage(event) {
            var file = event.target.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = function (e) {
                var preview = document.getElementById('image-preview');
                var wrapper = document.getElementById('preview-wrapper');
                var currentWrapper = document.getElementById('current-image-wrapper');

                preview.src = e.target.result;
                wrapper.style.display = 'block';

                if (currentWrapper) currentWrapper.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
