<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"> <head>
    <meta charset="UTF-8">
</head>
<body>
    <nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/product/list">FPT Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/product/list">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/product/list?cid=1000">Đồng hồ</a> </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/product/list?cid=1001">Máy tính</a> </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/product/list?cid=1002">Điện thoại</a> </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/product/list?cid=1003">Tai nghe</a> </li>
                </ul>
                
                <ul class="navbar-nav">
                    <li class="nav-item">
                       <a th:href="@{/cart}" class="nav-link text-white text-decoration-none me-3">
					    <i class="fas fa-shopping-cart"></i> Giỏ hàng 
					    <span id="cart-count" 
					          class="badge bg-danger rounded-pill" 
					          th:text="${session.cart != null ? session.cart.size() : 0}">0
					    </span>
					</a>
                    </li>
                    <li class="nav-item">
                       <div class="d-flex align-items-center">
    
                            <a sec:authorize="isAnonymous()" th:href="@{/login}" class="nav-link text-white text-decoration-none">
                                <i class="fas fa-user"></i> Đăng nhập
                            </a>

                            <div sec:authorize="isAuthenticated()" class="dropdown">
                                <a class="nav-link text-white text-decoration-none dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                                    <i class="fas fa-user-circle"></i> Xin chào, <b sec:authentication="name">User</b>
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end mt-2">
                                    <li><a class="dropdown-item" th:href="@{/order/history}">Đơn hàng của tôi</a></li>
                                    <li><a class="dropdown-item" th:href="@{/tai-khoan/ho-so}">Cập nhật hồ sơ</a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li>
                                        <form th:action="@{/logout}" method="post" class="m-0">
                                            <button type="submit" class="dropdown-item text-danger border-0 bg-transparent">Đăng xuất</button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</body>
</html>
