<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm - FPT Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .products-section {
            padding: 30px 0;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
            padding-left: 0;
        }

        .section-title i {
            color: #0d6efd;
            margin-right: 10px;
        }

        /* Product Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (min-width: 992px) {
            .products-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        /* Product Card */
        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        /* Product Image */
        .product-img-container {
            position: relative;
            width: 100%;
            height: 200px;
            background-color: #f9f9f9;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover img {
            transform: scale(1.08);
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .product-badge.out-of-stock {
            background-color: #dc3545;
        }

        /* Product Info */
        .product-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.6rem;
        }

        .product-name a {
            color: #333;
            text-decoration: none;
        }

        .product-name a:hover {
            color: #0d6efd;
        }

        .product-category {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #dc3545;
            margin: 10px 0;
        }

        /* Product Actions */
        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }

        .btn-view {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #0d6efd;
            background: white;
            color: #0d6efd;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            cursor: pointer;
        }

        .btn-view:hover {
            background: #0d6efd;
            color: white;
        }

        .btn-cart {
            flex: 1;
            padding: 8px 10px;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-cart:hover {
            background: #0b5ed7;
        }

        .btn-cart:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 8px;
            margin: 20px 0;
        }

        .empty-message i {
            font-size: 3.5rem;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-message h3 {
            color: #999;
            margin-bottom: 10px;
        }

        .empty-message p {
            color: #ccc;
        }

        .product-count {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div th:replace="~{layout/_header :: header}"></div>

    <!-- Main Content -->
    <main class="container products-section">
        <!-- Title -->
        <h2 class="section-title">
            <i class="fas fa-shopping-bag"></i> Sản Phẩm
        </h2>

        <!-- Products Count 
        <div th:if="${items != null and !items.isEmpty()}" class="product-count">
            📦 Có <strong th:text="${items.size()}"></strong> sản phẩm
        </div> -->

        <!-- Product Grid -->
        <div th:if="${items != null and !items.isEmpty()}" class="products-grid">
            <div th:each="p : ${items}" class="product-card">
                
                <!-- Image Container -->
                <div class="product-img-container">
                    <img th:src="@{|/assets/images/${p.image}|}" 
                         th:alt="${p.name}"
                         loading="lazy">
                    
                    <!-- Badge -->
                    <span class="product-badge"
                          th:classappend="${!p.available ? 'out-of-stock' : ''}"
                          th:text="${p.available ? 'Còn hàng' : 'Hết hàng'}">
                    </span>
                </div>

                <!-- Product Info -->
                <div class="product-info">
                    <!-- Category -->
                    <div class="product-category" th:text="${p.category.name}"></div>

                    <!-- Product Name -->
                    <h5 class="product-name">
                        <a th:href="@{|/product/detail/${p.id}|}" 
                           th:text="${p.name}"></a>
                    </h5>

                    <!-- Price -->
                    <div class="product-price">
                        <span th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}"></span>
                        <span>đ</span>
                    </div>

                    <!-- Actions -->
                    <div class="product-actions">
                        <a th:href="@{|/product/detail/${p.id}|}" class="btn-view">
                            Chi tiết
                        </a>
                        <button type="button" 
                                class="btn-cart btn-add-cart"
                                th:data-id="${p.id}"
                                th:disabled="${!p.available}">
                            <i class="fas fa-shopping-cart"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${items == null or items.isEmpty()}" class="empty-message">
            <i class="fas fa-inbox"></i>
            <h3>Không có sản phẩm</h3>
            <p>Vui lòng quay lại hoặc chọn danh mục khác</p>
            <a href="/" class="btn btn-primary mt-3">
                <i class="fas fa-arrow-left"></i> Quay lại trang chủ
            </a>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Add to cart functionality
        const addCartButtons = document.querySelectorAll('.btn-add-cart');

        addCartButtons.forEach(button => {
            button.addEventListener('click', function() {
                if (this.disabled) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Sản phẩm hết hàng',
                        text: 'Rất tiếc, sản phẩm này đã hết hàng!',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    return;
                }

                let productId = this.getAttribute('data-id');
                let productName = this.closest('.product-card').querySelector('.product-name a').textContent;

                fetch('/api/cart/add/' + productId, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => {
                    if(response.ok) {
                        return response.json();
                    }
                    throw new Error('Lỗi server');
                })
                .then(data => {
                    Swal.fire({
                        icon: 'success',
                        title: 'Đã thêm vào giỏ!',
                        text: productName,
                        timer: 1500,
                        showConfirmButton: false,
                        position: 'top-end',
                        toast: true
                    });
                    
                    document.getElementById("cart-count").innerText = data.totalItems;
                })
                .catch(error => {
                    Swal.fire({
                        icon: 'error',
                        title: 'Lỗi!',
                        text: 'Không thể thêm sản phẩm lúc này!',
                        timer: 1500
                    });
                });
            });
        });
    </script>
</body>
</html>
