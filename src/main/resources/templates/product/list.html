<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Store - Danh sách sản phẩm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #4f46e5;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .products-section {
            padding: 50px 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        .section-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 0;
            letter-spacing: -0.5px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--card-shadow);
            border-color: var(--primary-color);
        }

        .product-img-wrapper {
            position: relative;
            padding-top: 100%;
            background-color: #fff;
            overflow: hidden;
        }

        .product-card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 20px;
            transition: transform 0.5s ease;
        }

        .product-card:hover img {
            transform: scale(1.1);
        }

        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            z-index: 2;
            backdrop-filter: blur(4px);
        }

        .badge-available {
            background: rgba(34, 197, 94, 0.9);
            color: white;
        }

        .badge-out {
            background: rgba(239, 68, 68, 0.9);
            color: white;
        }

        .product-details {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .category-tag {
            font-size: 12px;
            color: var(--primary-color);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .product-name-link {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-main);
            text-decoration: none;
            line-height: 1.4;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 48px;
        }

        .product-name-link:hover {
            color: var(--primary-color);
        }

        .price-wrapper {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .current-price {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }

        .action-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-main {
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-outline {
            border: 2px solid #e2e8f0;
            color: var(--text-muted);
            background: transparent;
            text-decoration: none;
        }

        .btn-outline:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-solid {
            background: var(--primary-color);
            color: white;
            border: none;
        }

        .btn-solid:hover {
            background: var(--secondary-color);
            transform: scale(1.05);
        }

        .btn-solid:disabled {
            background: #cbd5e1;
            transform: none;
        }

        .empty-container {
            text-align: center;
            padding: 100px 20px;
            background: white;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
        }

        .empty-container i {
            font-size: 80px;
            background: linear-gradient(to bottom right, #e2e8f0, #f8fafc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .swal2-popup {
            border-radius: 20px !important;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container products-section">
        <div class="section-header">
            <div>
                <h2 class="section-title">Bộ Sưu Tập Mới</h2>
                <p class="text-muted mb-0">Khám phá những sản phẩm công nghệ hàng đầu</p>
            </div>
            <div th:if="${items != null and !items.isEmpty()}" class="d-none d-md-block">
                <span class="badge bg-light text-dark border p-2">
                    <i class="fas fa-layer-group me-1"></i> <span th:text="${items.size()}"></span> sản phẩm
                </span>
            </div>
        </div>

        <div th:if="${items != null and !items.isEmpty()}" class="products-grid">
            <div th:each="p : ${items}" class="product-card">

                <div class="product-img-wrapper">
                    <span th:class="${p.available != null and p.available ? 'status-badge badge-available' : 'status-badge badge-out'}"
                          th:text="${p.available != null and p.available ? 'Còn hàng' : 'Hết hàng'}">
                    </span>

                    <!-- ✅ SỬA: đổi /assets/images/ → /images/ cho khớp với WebMvcConfig -->
                    <img th:src="@{|/images/${p.image}|}" th:alt="${p.name}" loading="lazy">
                </div>

                <div class="product-details">
                    <span class="category-tag" th:text="${p.category.name}">Category</span>

                    <a th:href="@{|/product/detail/${p.id}|}" class="product-name-link">
                        <span th:text="${p.name}">Product Name</span>
                    </a>

                    <div class="price-wrapper">
                        <div class="current-price">
                            <span th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}"></span>
                            <small>₫</small>
                        </div>
                    </div>

                    <div class="action-group">
                        <a th:href="@{|/product/detail/${p.id}|}" class="btn-main btn-outline">
                            Chi tiết
                        </a>
                        <button type="button"
                                class="btn-main btn-solid btn-add-cart"
                                th:data-id="${p.id}"
                                th:disabled="${!p.available}">
                            <i class="fas fa-plus"></i> Giỏ hàng
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${items == null or items.isEmpty()}" class="empty-container">
            <i class="fas fa-shopping-basket"></i>
            <h3 class="fw-bold">Kho hàng trống</h3>
            <p class="text-muted">Hiện tại chúng tôi chưa có sản phẩm nào trong danh mục này.</p>
            <a href="/" class="btn btn-primary rounded-pill px-4 mt-3">
                Tiếp tục mua sắm
            </a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const addCartButtons = document.querySelectorAll('.btn-add-cart');

        addCartButtons.forEach(button => {
            button.addEventListener('click', function() {
                if (this.disabled) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Rất tiếc!',
                        text: 'Sản phẩm hiện đang tạm hết hàng.',
                        confirmButtonColor: '#6366f1'
                    });
                    return;
                }

                let productId = this.getAttribute('data-id');
                let productName = this.closest('.product-card').querySelector('.product-name-link').textContent.trim();

                fetch('/api/cart/add/' + productId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(response => {
                    if(response.ok) return response.json();
                    throw new Error('Lỗi server');
                })
                .then(data => {
                    Swal.fire({
                        icon: 'success',
                        title: 'Đã thêm thành công',
                        text: productName,
                        timer: 2000,
                        showConfirmButton: false,
                        position: 'top-end',
                        toast: true,
                        background: '#fff',
                        color: '#1e293b'
                    });

                    if (typeof window.refreshCartBadge === 'function') {
                        window.refreshCartBadge();
                    }
                })
                .catch(error => {
                    Swal.fire({
                        icon: 'error',
                        title: 'Thất bại',
                        text: 'Không thể kết nối đến máy chủ!',
                    });
                });
            });
        });
    </script>
</body>
</html>
