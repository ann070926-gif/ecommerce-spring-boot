<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${item.name} + ' - Chi tiết sản phẩm'"></title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #4f46e5;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            line-height: 1.6;
        }

        .detail-container {
            padding: 60px 0;
        }

        /* Product Card Style */
        .product-detail-card {
            background: white;
            border-radius: 24px;
            border: none;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        /* Image Section */
        .image-box {
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            height: 100%;
            min-height: 450px;
        }

        .image-box img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
            transition: transform 0.5s ease;
        }

        .image-box:hover img {
            transform: scale(1.05);
        }

        /* Info Section */
        .info-box {
            padding: 50px;
            background: #fff;
        }

        .category-path {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .product-title {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        .price-tag {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .price-tag small {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Specification List */
        .specs-list {
            list-style: none;
            padding: 0;
            margin-bottom: 40px;
            border-top: 1px solid #f1f5f9;
            padding-top: 25px;
        }

        .specs-item {
            display: flex;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .specs-label {
            width: 140px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .specs-value {
            color: var(--text-main);
            font-weight: 600;
        }

        /* Badge Styles */
        .status-pill {
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .status-available {
            background-color: #ecfdf5;
            color: #10b981;
        }

        .status-out {
            background-color: #fef2f2;
            color: #ef4444;
        }

        /* Action Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-cart-large {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-cart-large:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
            color: white;
        }

        .btn-back {
            background: white;
            color: var(--text-muted);
            border: 2px solid #e2e8f0;
            padding: 16px 25px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            border-color: var(--text-main);
            color: var(--text-main);
            background: #f8fafc;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .info-box { padding: 30px; }
            .product-title { font-size: 28px; }
            .image-box { min-height: 300px; }
        }
    </style>
</head>
<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container detail-container">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/" class="text-decoration-none text-muted">Trang chủ</a></li>
                <li class="breadcrumb-item"><a href="/product/list" class="text-decoration-none text-muted">Sản phẩm</a></li>
                <li class="breadcrumb-item active" aria-current="page" th:text="${item.name}"></li>
            </ol>
        </nav>

        <div class="product-detail-card">
            <div class="row g-0">
                <div class="col-lg-6 border-end" style="background: #fff;">
                    <div class="image-box">
                        <img th:src="@{|/assets/images/${item.image}|}" 
                             class="img-fluid" 
                             alt="Product Image">
                    </div>
                </div>
                
                <div class="col-lg-6">
                    <div class="info-box">
                        <span class="category-path" th:text="${item.category.name}">CATEGORY</span>
                        <h1 class="product-title" th:text="${item.name}">Product Name</h1>
                        
                        <div class="price-tag">
                            <span th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}"></span>
                            <small>VNĐ</small>
                        </div>

                        <ul class="specs-list">
                            <li class="specs-item">
                                <span class="specs-label">Mã sản phẩm:</span>
                                <span class="specs-value" th:text="${item.id}">#ID</span>
                            </li>
                            <li class="specs-item">
                                <span class="specs-label">Ngày nhập kho:</span>
                                <span class="specs-value" th:text="${#dates.format(item.createDate, 'dd-MM-yyyy')}">01-01-2024</span>
                            </li>
                            <li class="specs-item">
                                <span class="specs-label">Trạng thái:</span>
                                <span class="specs-value">
                                    <span th:class="${item.available ? 'status-pill status-available' : 'status-pill status-out'}"
                                          th:text="${item.available ? 'Còn hàng' : 'Hết hàng'}">
                                    </span>
                                </span>
                            </li>
                        </ul>

                        <div class="button-group">
                            <button class="btn btn-cart-large" 
                                    th:onclick="|window.location.href='/cart/add/' + ${item.id}|"
                                    th:disabled="${!item.available}">
                                <i class="fas fa-shopping-bag"></i>
                                THÊM VÀO GIỎ HÀNG
                            </button>

                            <a href="/product/list" class="btn-back">
                                <i class="fas fa-arrow-left"></i>
                                Tiếp tục mua sắm
                            </a>
                        </div>

                        <div class="mt-5 d-flex gap-4 border-top pt-4">
                            <div class="text-center">
                                <i class="fas fa-truck-fast mb-2 text-muted"></i>
                                <p style="font-size: 11px;" class="text-muted fw-bold">GIAO HÀNG NHANH</p>
                            </div>
                            <div class="text-center">
                                <i class="fas fa-shield-halved mb-2 text-muted"></i>
                                <p style="font-size: 11px;" class="text-muted fw-bold">BẢO HÀNH CHÍNH HÃNG</p>
                            </div>
                            <div class="text-center">
                                <i class="fas fa-rotate-left mb-2 text-muted"></i>
                                <p style="font-size: 11px;" class="text-muted fw-bold">7 NGÀY ĐỔI TRẢ</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
