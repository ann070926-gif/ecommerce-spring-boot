<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f5f5fa; }
        .card { border: none; border-radius: 8px; }
        .form-check-label { cursor: pointer; }
    </style>
</head>
<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container mt-4 mb-5">
        <form th:action="@{/checkout}" method="post">
            <div class="row">
                
                <div class="col-lg-8">
                    
                    <div class="card shadow-sm mb-3">
                        <div class="card-header bg-white fw-bold fs-5 py-3">
                            Thông tin giao hàng
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Họ và tên người nhận</label>
                                    <input type="text" name="fullname" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Số điện thoại</label>
                                    <input type="text" name="phone" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Địa chỉ chi tiết</label>
                                <textarea name="address" class="form-control" rows="2" placeholder="Số nhà, đường, phường/xã..." required></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-3">
                        <div class="card-header bg-white fw-bold fs-5 py-3">
                            Chọn hình thức thanh toán
                        </div>
                        <div class="card-body">
                            <div class="form-check border border-info rounded p-3 mb-2 bg-light">
                                <input class="form-check-input ms-1 mt-2" type="radio" name="paymentMethod" id="cash" value="COD" checked>
                                <label class="form-check-label ms-2 d-flex align-items-center w-100" for="cash">
                                    <i class="fas fa-money-bill-wave text-success fs-3 me-3"></i>
                                    <div>
                                        <strong>Thanh toán tiền mặt</strong><br>
                                        <small class="text-muted">Thanh toán khi nhận hàng (COD)</small>
                                    </div>
                                </label>
                            </div>

                            <div class="form-check border rounded p-3 mb-2">
                                <input class="form-check-input ms-1 mt-2" type="radio" name="paymentMethod" id="banking" value="BANKING">
                                <label class="form-check-label ms-2 d-flex align-items-center w-100" for="banking">
                                    <i class="fas fa-university text-primary fs-3 me-3"></i>
                                    <div>
                                        <strong>Chuyển khoản ngân hàng</strong><br>
                                        <small class="text-muted">Quét mã QR hoặc chuyển khoản ứng dụng ngân hàng</small>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card shadow-sm position-sticky" style="top: 20px;">
                        <div class="card-header bg-white fw-bold fs-5 py-3">
                            Đơn hàng
                        </div>
                        <div class="card-body">
                            
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Tổng tiền hàng</span>
                                <strong th:text="${#numbers.formatDecimal(totalAmount != null ? totalAmount : 0, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</strong>
                            </div>
                            
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Phí vận chuyển</span>
                                <strong>30,000 đ</strong>
                            </div>
                            
                            <hr>
                            
                            <div class="d-flex justify-content-between mb-4">
                                <span>Tổng tiền thanh toán</span>
                                <strong class="text-danger fs-4" th:text="${#numbers.formatDecimal((totalAmount != null ? totalAmount : 0) + 30000, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</strong>
                            </div>

                            <p class="text-end text-muted" style="font-size: 12px;">(Giá này đã bao gồm thuế GTGT, phí đóng gói, phí vận chuyển...)</p>

                            <button type="submit" class="btn btn-danger w-100 py-3 fw-bold fs-5">Đặt hàng</button>
                        </div>
                    </div>
                </div>

            </div>
        </form>
    </main>
</body>
</html>
