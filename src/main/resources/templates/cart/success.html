<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .success-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .success-box {
            background: white;
            border-radius: 15px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .success-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
            animation: bounce 0.6s ease-in-out;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .success-title {
            color: #333;
            font-weight: bold;
            font-size: 28px;
            margin-bottom: 15px;
        }
        .success-subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .success-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #28a745;
        }
        .success-info p {
            margin: 0;
            color: #495057;
            font-size: 14px;
        }
        .btn-primary-custom {
            background: #28a745;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            margin: 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .btn-primary-custom:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        .btn-outline-custom {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 28px;
            font-size: 16px;
            font-weight: 600;
            margin: 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .btn-outline-custom:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <div class="success-container">
        <div class="success-box">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            
            <h2 class="success-title">ĐẶT HÀNG THÀNH CÔNG!</h2>
            
            <p class="success-subtitle">
                Cảm ơn bạn đã mua sắm tại FPT Shop. Đơn hàng của bạn đang được xử lý và sẽ được giao trong thời gian sớm nhất.
            </p>
            
            <div class="success-info">
                <p><i class="fas fa-info-circle me-2"></i> Vui lòng kiểm tra email của bạn để nhận xác nhận đơn hàng</p>
            </div>
            
            <div>
                <a href="/" class="btn btn-primary-custom text-white text-decoration-none">
                    <i class="fas fa-home me-2"></i> Về trang chủ
                </a>
                <a href="/order/history" class="btn btn-outline-custom text-decoration-none">
                    <i class="fas fa-history me-2"></i> Xem lịch sử đơn hàng
                </a>
            </div>
        </div>
    </div>

    <div th:replace="~{layout/_footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
