<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng của bạn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container mt-4">
        <h2 class="mb-4 text-primary"><i class="fas fa-shopping-cart"></i> GIỎ HÀNG CỦA BẠN</h2>
        
        <div th:if="${cartItems == null or cartItems.isEmpty()}" class="alert alert-warning text-center">
            <h5 class="mb-3">Giỏ hàng của bạn đang trống!</h5>
            <a th:href="@{/}" class="btn btn-primary">Tiếp tục mua sắm</a>
        </div>

        <div th:if="${cartItems != null and !cartItems.isEmpty()}">
            <div class="table-responsive shadow-sm">
                <table class="table table-bordered table-hover align-middle mb-0">
                    <thead class="table-light text-center">
                        <tr>
                            <th>Hình ảnh</th>
                            <th>Tên sản phẩm</th>
                            <th>Đơn giá</th>
                            <th style="width: 120px;">Số lượng</th>
                            <th>Thành tiền</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cartItems}" class="text-center">
                            <td style="width: 100px;">
                                <img th:src="@{|/assets/images/${item.product.image}|}" alt="Ảnh" class="img-fluid rounded">
                            </td>
                            <td class="text-start fw-bold" th:text="${item.product.name}"></td>
                            
                            <td th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            
                            <td>
                                <input type="number" class="form-control text-center" th:value="${item.quantity}" min="1">
                            </td>
                            
                            <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(item.subTotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            
                            <td>
                                <button class="btn btn-sm btn-outline-danger" title="Xóa">
                                    <i class="fas fa-trash-alt"></i> Xóa
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="row mt-4 mb-5">
                <div class="col-md-6">
                    <a th:href="@{/}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Tiếp tục mua sắm</a>
                </div>
                <div class="col-md-6 text-end">
                    <h4>Tổng thanh toán: <span class="text-danger fw-bold" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span></h4>
                    <a th:href="@{/checkout}" class="btn btn-success btn-lg mt-2 px-5">Tiến hành đặt hàng <i class="fas fa-arrow-right"></i></a>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
