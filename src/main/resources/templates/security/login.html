<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #4f46e5;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            border: none;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }

        .auth-header {
            padding: 40px 40px 20px;
            text-align: center;
        }

        .auth-header h2 {
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .auth-body {
            padding: 0 40px 40px;
        }

        /* Form Styling */
        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 2px solid #f1f5f9;
            background-color: #f8fafc;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background-color: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        /* Buttons */
        .btn-auth {
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary-auth {
            background-color: var(--primary-color);
            border: none;
            color: white;
            margin-top: 10px;
        }

        .btn-primary-auth:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        /* Google Button Custom */
        .google-btn {
            background: white;
            border: 2px solid #f1f5f9;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .google-btn:hover {
            background: #f8fafc;
            border-color: #e2e8f0;
            color: var(--text-main);
        }

        .google-btn i {
            color: #ea4335; /* Google Red */
            font-size: 18px;
        }

        /* Divider */
        .oauth-divider {
            position: relative;
            text-align: center;
            margin: 30px 0;
        }

        .oauth-divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #f1f5f9;
        }

        .oauth-divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
        }

        /* Alerts Custom */
        .alert-auth {
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            background-color: #fef2f2;
            color: #ef4444;
            padding: 12px;
            margin-bottom: 25px;
        }

        .register-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <div class="login-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Chào mừng trở lại!</h2>
                <p class="text-muted">Vui lòng nhập thông tin để truy cập hệ thống</p>
            </div>

            <div class="auth-body">
                <div th:if="${param.error}" class="alert alert-auth text-center">
                    <i class="fas fa-exclamation-circle me-2"></i> Tài khoản hoặc mật khẩu không chính xác!
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Tên đăng nhập</label>
                        <input type="text" name="username" class="form-control" placeholder="Nhập username của bạn" required>
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <label class="form-label">Mật khẩu</label>
                            </div>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-auth btn-primary-auth">
                            Đăng Nhập
                        </button>
                    </div>
                </form>

                <div class="oauth-divider">
                    <span>Hoặc tiếp tục với</span>
                </div>

                <div class="d-grid mb-4">
                    <a th:href="@{/oauth2/authorization/google}" class="btn btn-auth google-btn">
                        <i class="fab fa-google"></i> Đăng nhập bằng Google
                    </a>
                </div>

                <div class="text-center text-muted small">
                    Chưa có tài khoản? 
                    <a th:href="@{/register}" class="register-link">Đăng ký ngay</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
