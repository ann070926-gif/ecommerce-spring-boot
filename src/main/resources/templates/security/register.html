<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #4f46e5;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            border: none;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 550px; /* Rộng hơn trang login một chút vì nhiều field hơn */
            overflow: hidden;
        }

        .auth-header {
            padding: 40px 40px 20px;
            text-align: center;
        }

        .auth-header h2 {
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .auth-body {
            padding: 0 40px 40px;
        }

        /* Form Styling */
        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 2px solid #f1f5f9;
            background-color: #f8fafc;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background-color: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        /* Submit Button */
        .btn-register {
            background-color: var(--primary-color);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        /* Error Alert */
        .alert-custom {
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            background-color: #fef2f2;
            color: #ef4444;
            padding: 12px;
            margin-bottom: 25px;
        }

        .login-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link:hover {
            text-decoration: underline;
        }

        .input-group-text {
            background: transparent;
            border: 2px solid #f1f5f9;
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: var(--text-muted);
        }

        .has-icon .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
        }
    </style>
</head>
<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <div class="auth-container">
        <div class="auth-card shadow-lg">
            <div class="auth-header">
                <h2>Tạo tài khoản mới</h2>
                <p class="text-muted">Gia nhập cộng đồng mua sắm Premium Store ngay hôm nay</p>
            </div>

            <div class="auth-body">
                <div th:if="${error}" class="alert alert-custom text-center">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/register}" th:object="${account}" method="post">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Tên đăng nhập (Username)</label>
                            <input type="text" th:field="*{username}" class="form-control" 
                                   required placeholder="Ví dụ: phucbeo123">
                        </div>
                        
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" th:field="*{fullname}" class="form-control" 
                                   required placeholder="Nhập tên đầy đủ của bạn">
                        </div>
                        
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Địa chỉ Email</label>
                            <input type="email" th:field="*{email}" class="form-control" 
                                   required placeholder="email@example.com">
                        </div>

                        <div class="col-md-12 mb-4">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" th:field="*{password}" class="form-control" 
                                   required placeholder="Tối thiểu 6 ký tự">
                        </div>
                    </div>

                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-register">
                            <i class="fas fa-user-plus me-2"></i> HOÀN TẤT ĐĂNG KÝ
                        </button>
                    </div>

                    <div class="text-center text-muted small">
                        Bạn đã là thành viên? 
                        <a th:href="@{/login}" class="login-link">Đăng nhập tại đây</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
